<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="banner">
      <div class="floating-text">
        <span class="letter" data-char="e">e</span>
        <span class="letter" data-char="s">s</span>
        <span class="letter" data-char="c">c</span>
        <span class="letter" data-char="a">a</span>
        <span class="letter" data-char="m">m</span>
        <span class="letter" data-char="p">p</span>
        <span class="letter" data-char="a">a</span>
        <span class="letter" data-char="r">r</span>
      </div>
    </section>
    <section class="gallery">
      <div class="big-image">
        <img src="assets/img/rohit-choudhari-_E6sXQHsgQc-unsplash.jpg" alt="Large portfolio image">
      </div>
      <div class="small-image">
        <img src="assets/img/kristaps-ungurs-FK0X8zKQP-8-unsplash.jpg" alt="Portfolio image">
      </div>
      <div class="small-image">
        <img src="assets/img/vojtech-bruzek-zMl9PjGFPWg-unsplash.jpg" alt="Portfolio image">
      </div>
    </section>
  </main>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery.ripples@0.6.3/dist/jquery.ripples.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
